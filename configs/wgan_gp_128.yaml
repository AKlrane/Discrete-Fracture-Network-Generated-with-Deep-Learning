data:
  image_dir: data/synthetic_dfn_128/images
  image_size: 128

model:
  latent_dim: 128
  base_channels: 64

training:
  batch_size: 64
  num_epochs: 200
  lr: 0.0001
  beta1: 0.0
  beta2: 0.9
  critic_steps: 5
  lambda_gp: 10.0
  sample_interval: 500
  checkpoint_interval: 5
  num_sample_images: 64
  seed: 42
  device: cuda

outputs:
  sample_dir: outputs/samples
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
