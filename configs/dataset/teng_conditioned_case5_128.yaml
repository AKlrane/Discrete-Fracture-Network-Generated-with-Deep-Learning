paper_case:
  id: 5
  description: Four pre-existing fractures, lmin = 10 m, lmax = 20 m, a = 2.
  preexisting_count: 4
  lmin: 10.0
  lmax: 20.0
  power_law_exponent: 2.0

dataset:
  num_samples: 30000
  image_size: 128
  seed: 42

output:
  out_dir: data/synthetic_dfn_teng_conditioned_case5_128

units:
  system: physical
  domain_width: 20.0
  domain_height: 20.0

fractures:
  min_fractures: 3
  max_fractures: 8
  min_width: 1
  max_width: 1

position:
  distribution: fractal
  fractal_dimension: 2.0
  fractal_levels: 6
  fixed_cascade_orientation: false

length:
  distribution: power_law
  min: 10.0
  max: 20.0
  power_law_exponent: 2.0

orientation:
  distribution: von_mises
  von_mises_mean_degrees: -30.0
  von_mises_kappa: 5.0

conditioning:
  mode: preexisting_connectivity
  preexisting_count: 4
  injection_index: 0
  max_attempts: 2000000
  remove_isolated_fractures: true
  prune_connected_fractures_to_target: true
  target_connected_fracture_count:
    min: 4
    max: 6

reference_stats:
  source: Teng et al. (2025) conditional DFN table.
  columns: [ld_2, ld_4, ld_8, ld_16]
  connectivity_probability:
    ld_2: 0.77
    ld_4: 0.59
    ld_8: 0.61
    ld_16: 0.62
  intersection_number:
    mean:
      ld_2: 7.03
      ld_4: 7.05
      ld_8: 6.96
      ld_16: 6.96
    variance:
      ld_2: 2.51
      ld_4: 2.71
      ld_8: 2.52
      ld_16: 2.50
  connected_fracture_number:
    mean:
      ld_2: 4.19
      ld_4: 4.20
      ld_8: 4.12
      ld_16: 4.15
    variance:
      ld_2: 0.76
      ld_4: 0.88
      ld_8: 0.72
      ld_16: 0.78
