dataset:
  num_samples: 30000
  image_size: 128
  seed: 42

output:
  out_dir: data/synthetic_dfn_teng_50_128

units:
  system: physical
  domain_width: 20.0
  domain_height: 20.0

fractures:
  min_fractures: 50
  max_fractures: 50
  min_width: 1
  max_width: 1

position:
  distribution: fractal
  fractal_dimension: 2.0
  fractal_levels: 6
  fixed_cascade_orientation: false

length:
  distribution: power_law
  min: 5.0
  max: 20.0
  power_law_exponent: 2.0

orientation:
  distribution: von_mises
  von_mises_mean_degrees: -30.0
  von_mises_kappa: 5.0

conditioning:
  mode: none
