paper_case:
  id: 4
  description: Three pre-existing fractures, lmin = 10 m, lmax = 20 m, a = 2.
  preexisting_count: 3
  lmin: 10.0
  lmax: 20.0
  power_law_exponent: 2.0

dataset:
  num_samples: 30000
  image_size: 128
  seed: 42

output:
  out_dir: data/synthetic_dfn_teng_conditioned_case4_128

units:
  system: physical
  domain_width: 20.0
  domain_height: 20.0

fractures:
  min_fractures: 3
  max_fractures: 8
  min_width: 1
  max_width: 1

position:
  distribution: fractal
  fractal_dimension: 2.0
  fractal_levels: 6
  fixed_cascade_orientation: false

length:
  distribution: power_law
  min: 10.0
  max: 20.0
  power_law_exponent: 2.0

orientation:
  distribution: von_mises
  von_mises_mean_degrees: -30.0
  von_mises_kappa: 5.0

conditioning:
  mode: preexisting_connectivity
  preexisting_count: 3
  injection_index: 0
  max_attempts: 2000000
  remove_isolated_fractures: true
  prune_connected_fractures_to_target: true
  target_connected_fracture_count:
    min: 3
    max: 5

reference_stats:
  source: Teng et al. (2025) conditional DFN table.
  columns: [ld_2, ld_4, ld_8, ld_16]
  connectivity_probability:
    ld_2: 0.81
    ld_4: 0.62
    ld_8: 0.68
    ld_16: 0.68
  intersection_number:
    mean:
      ld_2: 6.44
      ld_4: 6.41
      ld_8: 6.49
      ld_16: 6.53
    variance:
      ld_2: 3.30
      ld_4: 3.75
      ld_8: 3.51
      ld_16: 3.59
  connected_fracture_number:
    mean:
      ld_2: 3.40
      ld_4: 3.32
      ld_8: 3.40
      ld_16: 3.39
    variance:
      ld_2: 0.85
      ld_4: 0.89
      ld_8: 0.81
      ld_16: 0.83
