dataset:
  num_samples: 30000
  image_size: 128
  seed: 42

output:
  out_dir: data/synthetic_dfn_teng_conditioned_lmin5_128

units:
  system: physical
  domain_width: 20.0
  domain_height: 20.0

fractures:
  min_fractures: 50
  max_fractures: 50
  min_width: 1
  max_width: 1

position:
  distribution: fractal
  fractal_dimension: 2.0
  fractal_levels: 6
  fixed_cascade_orientation: false

length:
  distribution: power_law
  min: 5.0
  max: 20.0
  power_law_exponent: 2.0

orientation:
  distribution: von_mises
  von_mises_mean_degrees: -30.0
  von_mises_kappa: 5.0

conditioning:
  mode: preexisting_connectivity
  max_attempts: 2000000
  remove_isolated_fractures: true
  preexisting_fractures:
    - id: injection_0
      role: injection
      center_x: 5.0
      center_y: 10.0
      length: 5.0
      angle_degrees: 0.0
      width: 1
    - id: monitoring_1
      role: monitoring
      center_x: 15.0
      center_y: 10.0
      length: 5.0
      angle_degrees: 0.0
      width: 1
    - id: monitoring_2
      role: monitoring
      center_x: 10.0
      center_y: 15.0
      length: 5.0
      angle_degrees: 90.0
      width: 1
