data:
  image_dir: data/synthetic_dfn_128/images
  image_size: 128

model:
  latent_dim: 128
  base_channels: 64

regularizer:
  type: gan
  lambda_recon: 1.0
  lambda_adv: 1.0
  discriminator_hidden_dim: 256
  discriminator_steps: 1

training:
  batch_size: 64
  num_epochs: 200
  lr: 0.0001
  beta1: 0.0
  beta2: 0.9
  sample_interval: 500
  checkpoint_interval: 50
  num_sample_images: 64
  seed: 42
  device: auto
  precision: bf16-mixed

outputs:
  sample_dir: outputs/wae_gan/samples
  checkpoint_dir: outputs/wae_gan/checkpoints
  log_dir: outputs/wae_gan/logs
