data:
  image_dir: data/synthetic_dfn_128/images
  image_size: 128

model:
  latent_dim: 128
  base_channels: 64

regularizer:
  type: mmd
  lambda_recon: 1.0
  lambda_mmd: 10.0
  imq_scales: [0.1, 0.2, 0.5, 1.0, 2.0, 5.0, 10.0]

training:
  batch_size: 64
  num_epochs: 200
  lr: 0.0001
  beta1: 0.0
  beta2: 0.9
  sample_interval: 500
  checkpoint_interval: 50
  num_sample_images: 64
  seed: 42
  device: auto
  precision: 32-true

outputs:
  sample_dir: outputs/wae_mmd/samples
  checkpoint_dir: outputs/wae_mmd/checkpoints
  log_dir: outputs/wae_mmd/logs
